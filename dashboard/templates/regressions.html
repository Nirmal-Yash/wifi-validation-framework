<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Regressions — WiFi Validation Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2em; background: #f0f4f8; }
        h1 { color: #1a3c6e; }
        nav a { margin-right: 1.5em; color: #1a3c6e; }
        table { border-collapse: collapse; width: 100%; background: white; margin-top: 1em; }
        th { background: #1a3c6e; color: white; padding: 10px; }
        td { padding: 9px; border-bottom: 1px solid #eee; }
        .regression { color: #c62828; font-weight: bold; }
        .fixed { color: #2e7d32; font-weight: bold; }
        .summary { background: #fff3e0; padding: 1em; border-radius: 4px; margin: 1em 0; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Results</a>
        <a href="/regressions">Regressions</a>
        <a href="/chart">Chart</a>
        <a href="/export/csv">Export CSV</a>
    </nav>
    <h1>Regression Analysis</h1>
    <div class="summary">
        <strong>{{ regressions|length }} regression(s)</strong> detected (PASS &rarr; FAIL)
    </div>
    <table>
        <tr>
            <th>Test</th>
            <th>Baseline</th>
            <th>Current</th>
            <th>Classification</th>
        </tr>
        {% for d in all_deltas %}
        <tr>
            <td>{{ d.test_name }}</td>
            <td>{{ d.baseline }}</td>
            <td>{{ d.current }}</td>
            <td class="{{ 'regression' if d.classification == 'REGRESSION' else 'fixed' if d.classification == 'FIXED' else '' }}">
                {{ d.classification }}
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
