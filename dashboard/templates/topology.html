{% extends "base.html" %}
{% block header_title %}Infrastructure Topology Map{% endblock %}

{% block content %}
<div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 h-[calc(100vh-140px)] flex flex-col relative">
    <div class="mb-4 text-sm text-slate-500 flex justify-between items-center">
        <span><i class="fa-solid fa-circle-info mr-1 text-blue-400"></i> Dynamic Topology loaded from devices.yaml</span>
        
        <div class="space-x-2">
            <input type="file" id="topologyUpload" accept=".gns3" class="hidden" onchange="handleFileUpload(event)">
            <button onclick="triggerImport()" class="bg-slate-700 hover:bg-slate-800 text-white px-4 py-2 rounded shadow text-xs font-bold transition-colors">
                <i class="fa-solid fa-file-import mr-1"></i> IMPORT GNS3
            </button>
            <button onclick="triggerRuntimeTest()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded shadow text-xs font-bold transition-colors">
                <i class="fa-solid fa-play mr-1"></i> RUN VALIDATION
            </button>
        </div>
    </div>
    <div id="mynetwork" class="flex-1 bg-slate-50 rounded-lg border border-slate-200 cursor-pointer"></div>
</div>

<!-- Runtime Terminal Modal -->
<div id="runtimeModal" class="hidden fixed inset-0 bg-slate-900 bg-opacity-80 flex justify-center items-center z-50 backdrop-blur-sm">
    <div class="bg-black rounded-xl shadow-2xl w-3/4 max-w-5xl flex flex-col h-5/6 overflow-hidden border border-slate-700">
        <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900">
            <h3 class="font-bold text-lg text-white"><i class="fa-solid fa-terminal mr-2 text-green-400"></i> Execution Console</h3>
            <button onclick="closeModal('runtimeModal')" class="text-slate-400 hover:text-white"><i class="fa-solid fa-times text-xl"></i></button>
        </div>
        <div class="p-6 flex-1 overflow-auto bg-black text-green-400 font-mono text-sm leading-relaxed whitespace-pre-wrap" id="terminalOutput">
            Initializing engine...
        </div>
    </div>
</div>

<style>
    @import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css');
</style>

<script>
    let network = null;

    function renderTopology() {
        fetch('/api/topology_data')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('mynetwork');
                const options = {
                    nodes: { shape: 'icon', font: { size: 14, color: '#334155', face: 'sans-serif' } },
                    edges: { arrows: 'to', smooth: { type: 'cubicBezier', forceDirection: 'vertical', roundness: 0.4 } },
                    layout: { hierarchical: { direction: 'UD', sortMethod: 'directed', nodeSpacing: 250, levelSeparation: 150 } },
                    physics: false
                };
                network = new vis.Network(container, data, options);
            });
    }

    // Load dynamic topology on page load
    document.addEventListener("DOMContentLoaded", renderTopology);

    function triggerImport() {
        if(confirm("WARNING: Importing a new GNS3 file will overwrite the current configuration in devices.yaml. \n\nThe system will automatically save a backup of your current setup to the artifacts/backups/ folder. \n\nDo you want to proceed?")) {
            document.getElementById('topologyUpload').click();
        }
    }

    function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append('file', file);

        document.getElementById('terminalOutput').innerText = "Uploading and parsing GNS3 topology file...\nCreating configuration backup...\n";
        document.getElementById('runtimeModal').classList.remove('hidden');

        fetch('/api/import_topology', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'success') {
                document.getElementById('terminalOutput').innerText += `\n[SUCCESS] ${data.message}\n`;
                renderTopology(); // Dynamically redraw the UI
                setTimeout(() => closeModal('runtimeModal'), 3000);
            } else {
                document.getElementById('terminalOutput').innerText += `\n[ERROR] ${data.error}`;
            }
        });
    }

    function triggerRuntimeTest() {
        document.getElementById('runtimeModal').classList.remove('hidden');
        document.getElementById('terminalOutput').innerText = "Executing Pytest assertions over current topology...\nNote: Validation requires matching test scripts for custom GNS3 nodes.\n\n";
        
        fetch('/api/run_validation', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fw_version: "Runtime-AdHoc" })
        })
        .then(response => response.json())
        .then(data => {
            document.getElementById('terminalOutput').innerText += data.stdout;
        });
    }

    function closeModal(modalId) {
        document.getElementById(modalId).classList.add('hidden');
    }
</script>
{% endblock %}
