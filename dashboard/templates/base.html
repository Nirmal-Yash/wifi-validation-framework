<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetRegress | Network QA Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<body class="bg-gray-50 text-slate-800 font-sans flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 text-white flex flex-col h-full shadow-xl z-20">
        <div class="h-16 flex items-center px-6 border-b border-slate-700 bg-slate-950">
            <i class="fa-solid fa-network-wired text-blue-400 text-xl mr-3"></i>
            <span class="text-lg font-bold tracking-wider">NetRegress QA</span>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
            <a href="/" class="flex items-center px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-700 hover:text-white transition-colors">
                <i class="fa-solid fa-chart-pie w-6"></i> Dashboard
            </a>
            <a href="/topology" class="flex items-center px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-700 hover:text-white transition-colors">
                <i class="fa-solid fa-sitemap w-6"></i> Network Topology
            </a>
            <a href="/history" class="flex items-center px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-700 hover:text-white transition-colors">
                <i class="fa-solid fa-clock-rotate-left w-6"></i> Execution History
            </a>
            <a href="/about" class="flex items-center px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-700 hover:text-white transition-colors">
                <i class="fa-solid fa-circle-info w-6"></i> About System
            </a>
        </nav>
        <div class="p-4 border-t border-slate-700 text-xs text-slate-500 text-center">
            v2.0 Automated Framework
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden">
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-8 z-10">
            <h2 class="text-xl font-semibold text-slate-700">{% block header_title %}Overview{% endblock %}</h2>
            <div class="flex items-center space-x-4">
                <span class="flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-3 w-3 rounded-full bg-green-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
                <span class="text-sm font-medium text-slate-500">Engine Online</span>
            </div>
        </header>

        <div class="flex-1 overflow-auto p-8">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Script to highlight active sidebar link -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const currentPath = window.location.pathname;
            const links = document.querySelectorAll('aside nav a');
            links.forEach(link => {
                if (link.getAttribute('href') === currentPath) {
                    link.classList.remove('text-slate-400');
                    link.classList.add('bg-slate-800', 'text-blue-300');
                }
            });
        });
    </script>
</body>
</html>
